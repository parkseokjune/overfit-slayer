# 자동매매 시스템 설정
exchange:
  id: binance          # ccxt 거래소 ID (공개 데이터 수집용, 키 불필요)
  testnet: true        # 주문은 항상 테스트넷만 (가드레일)
  market_type: futures # USDT-M 무기한 선물 (레버리지/숏 가능)

market:
  symbol: BTC/USDT     # 비트코인 단일 (사용자 지정)
  timeframes: [1h, 4h, 1d]
  history_days: 730    # 백테스트용 수집 기간 (2년)

futures:
  leverage: 3          # 기본 레버리지 (실험으로 조정)
  allow_short: true
  funding_rate_8h: 0.0001  # 평균 펀딩비 0.01%/8h 가정

backtest:
  fee_pct: 0.0005      # 0.05% (Binance 선물 taker)
  slippage_pct: 0.0005 # 0.05%
  initial_capital: 10000  # USDT

walk_forward:
  train_months: 6
  test_months: 1

risk:
  position_pct: 0.95     # 진입 시 자본 대비 포지션 비율
  stop_loss_pct: 0.02    # -2% 손절
  daily_loss_limit_pct: 0.05  # 일일 -5%면 당일 중단

strategies:
  sma_cross:
    fast: 20
    slow: 60
  rsi_mean_revert:
    period: 14
    oversold: 30
    overbought: 70
  bb_breakout:
    period: 20
    std: 2.0

ai:
  model: claude-sonnet-4-6
  regime_lookback_candles: 100

# 운용 북 (자가학습 모듈이 자동 갱신 — 수동 편집 시 다음 사이클 반영)
books:
  sma_slow:
    weight: 0.5
    timeframe: 1d
    leverage: 2
    strategy: sma_cross
    fast: 10
    slow: 200
    stop_loss: 0.04
    trailing: 0.08
    regime_filter: false
    vol_target: 0.40
  supertrend:
    weight: 0.5
    timeframe: 1d
    leverage: 2
    strategy: supertrend
    period: 14
    multiplier: 1.5
    stop_loss: 0.04
    trailing: 0.08
    regime_filter: false
    vol_target: 0.40
